startDelaySeconds: 0
lowercaseOutputName: true
lowercaseOutputLabelNames: true

rules:
  - pattern: 'kafka.server<type=(.+), name=(.+)><>Value'
    name: kafka_server_$1_$2
    type: GAUGE

  - pattern: 'kafka.network<type=(.+), name=(.+)><>Value'
    name: kafka_network_$1_$2
    type: GAUGE

  - pattern: 'kafka.log<type=(.+), name=(.+)><>Value'
    name: kafka_log_$1_$2
    type: GAUGE

  - pattern: 'kafka.controller<type=(.+), name=(.+)><>Value'
    name: kafka_controller_$1_$2
    type: GAUGE

  - pattern: 'kafka.server<type=(.+), name=(.+), topic=(.+)><>Count'
    name: kafka_server_$1_$2_count
    labels:
      topic: "$3"
    type: COUNTER

  - pattern: 'java.lang<type=Memory><HeapMemoryUsage>(used|max|committed|init)'
    name: jvm_memory_heap_$1_bytes
    type: GAUGE

  - pattern: 'java.lang<type=GarbageCollector, name=(.+)><>(CollectionCount|CollectionTime)'
    name: jvm_gc_$2
    labels:
      collector: "$1"
    type: COUNTER

  - pattern: 'java.lang<type=Threading><>(ThreadCount|DaemonThreadCount|PeakThreadCount)'
    name: jvm_threads_$1
    type: GAUGE

  - pattern: 'java.lang<type=OperatingSystem><>(OpenFileDescriptorCount|MaxFileDescriptorCount|ProcessCpuLoad|SystemCpuLoad)'
    name: jvm_os_$1
    type: GAUGE
