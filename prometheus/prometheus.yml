global:
  scrape_interval: 15s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: node
    scrape_interval: 1s
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: kafka_ext4_jmx
    scrape_interval: 3s
    static_configs:
      - targets: ["kafka-ext4:7071"]

  - job_name: kafka_f2fs_jmx
    scrape_interval: 3s
    static_configs:
      - targets: ["kafka-f2fs:7072"]
